name: Manual Python Test Workflow

on:
  push:
  workflow_dispatch:
    inputs:
      python-version:
        description: "Choose Python version"
        required: true
        default: "3.9"
        type: choice
        options:
          - "3.9"
          - "3.10"
          - "3.11"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python-version || '3.9' }}

      - name: Install dependencies
        run: |
          cd Chapter4
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run tests
        run: |
          cd Chapter4
          python -m unittest discover

      - name: Notify success
        if: success()
        run: echo "Tests passed on Python ${{ github.event.inputs.python-version || '3.9' }}"